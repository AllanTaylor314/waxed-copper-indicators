name: Build resource pack

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate item definitions
        run: python generate_items.py

      - name: Assemble resource pack
        run: |
          staging="${RUNNER_TEMP}/waxed-copper-indicators"
          mkdir -p "$staging"
          cp pack.mcmeta pack.png "$staging/"
          cp -r assets "$staging/"
          cp -r overlay_golem_textures "$staging/"
          find "$staging" -type f \( -iname 'readme.txt' -o -iname 'readme.md' \) -delete

      - name: Minify JSON
        run: python minify_json.py "${RUNNER_TEMP}/waxed-copper-indicators"

      - name: Create resource pack zip
        run: |
          staging="${RUNNER_TEMP}/waxed-copper-indicators"
          mkdir -p dist
          (cd "$staging" && zip -9 -r "$GITHUB_WORKSPACE/dist/waxed-copper-indicators.zip" .)

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Waxed Copper Indicators.zip
          path: dist/waxed-copper-indicators.zip
          archive: false
